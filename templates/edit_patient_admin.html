<!DOCTYPE html>
<html>
<head>
    <title>Edit Patient Page</title>
    <link rel="stylesheet" href="../static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" 
    crossorigin="anonymous">
    <style>
    #form-body{
    border:1px solid grey;
    width:300px;
    height:400px;
    margin:auto;
    margin-top:200px;
    border-radius:5px;
    padding:10px
}
    </style>
</head>
<body>
    <div id="main">
        <div id="canvas">
            <div id="form-body">
                <h2>Update Patient</h2>
                {% if patient %}
                <form action="/admin/edit-patient/{{patient.Patient_id}}" method="post">
                    <div class="mb-3">
                        <label for="Patient" class="form-label">Patient Name</label>
                        <input type="text" class="form-control" id="Patient" name="pname">
                    </div>
                    <div class="mb-3">
                        <label for="Doctor" class="form-label">Doctor Name</label>
                        <input type="text" class="form-control" id="Doctor" name="dname">
                    </div>
                    <div class="mb-3">
                        <label for="Department" class="form-label">Department Name</label>
                        <input type="text" class="form-control" id="Department" name="department">
                    </div>
                    <div class="text-center">
                        <input type="submit" class="btn btn-primary" value="Update">
                    </div>
                </form>
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
