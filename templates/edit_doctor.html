<!DOCTYPE html>
<html>
<head>
    <title>Edit Doctor Page</title>
    <link rel="stylesheet" href="../static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" 
    crossorigin="anonymous">
    <style>
        #form-body{
    border:1px solid grey;
    width:300px;
    height:362px;
    margin:auto;
    margin-top:200px;
    border-radius:5px;
    padding:10px
}
    </style>
</head>
<body>
    <div id="main">
        <div id="canvas">
            <div id="form-body">
                <h2>Update Doctor</h2>
                <form action="/admin/edit-doctor/{{doctor.Doctor_id}}" method="post"> 
                    {% if error %}
                    <div><strong>{{error}}</strong></div>
                    {% endif %}
                    <div class="mb-3">
                        <label for="Doctor_name" class="form-label">Doctor Name</label>
                        <input type="text" class="form-control" id="Doctor_name" name="Doctor_name" value="{{doctor.Doctor_name}}" required>
                    </div>
                    <div class="mb-3">
                        <label for="Department_name" class="form-label">Specialisation/ Department</label>
                        <input type="text" class="form-control" id="Department_name" name="Department_name" value="{{doctor.Department_name}}" required>
                    </div>
                    <div class="mb-3">
                        <label for="Experience" class="form-label">Experience (in years)</label>
                        <input type="number" class="form-control" id="Experience" name="Experience" value="{{doctor.Experience}}" required>
                    </div>
                    <div class="text-center">
                        <input type="submit" class="btn btn-primary" value="Update">
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
